name: Deploy GitHub Pages Snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      send_test_email:
        description: Send the daily digest after generating the snapshot
        required: false
        default: false
        type: boolean
  schedule:
    # 4:00 AM Houston time during CDT translates to 9:00 AM UTC.
    - cron: "0 9 * * *"
    # Backup run a little later in the morning in case the first scheduled job is delayed.
    - cron: "0 11 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: true
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate snapshot data
        run: npm run generate:snapshot

      - name: Send daily email digest
        if: >-
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.send_test_email == true)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DAILY_EMAIL_TO: ${{ secrets.DAILY_EMAIL_TO }}
          DAILY_EMAIL_FROM: ${{ secrets.DAILY_EMAIL_FROM }}
        run: npm run send:daily-email

      - name: Build static export
        env:
          DASHBOARD_DATA_MODE: snapshot
          ENABLE_STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
