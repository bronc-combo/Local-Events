name: Deploy GitHub Pages Snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 8:00 AM Houston time during CDT translates to 1:00 PM UTC.
    - cron: "0 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: true
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate snapshot data
        run: npm run generate:snapshot

      - name: Build static export
        env:
          DASHBOARD_DATA_MODE: snapshot
          ENABLE_STATIC_EXPORT: "true"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
